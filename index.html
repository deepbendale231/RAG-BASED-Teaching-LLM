<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Deep's Personalised AI Tutor </title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top left, #1f2937, #0f172a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.app {
    width: 100%;
    max-width: 900px;
    height: 95vh;
    backdrop-filter: blur(18px);
    background: rgba(255,255,255,0.05);
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.header {
    padding: 20px;
    font-size: 18px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    letter-spacing: 1px;
    opacity: 0.9;
}

.chat {
    flex: 1;
    overflow-y: auto;
    padding: 25px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.message {
    max-width: 75%;
    padding: 15px 18px;
    border-radius: 14px;
    animation: fadeIn 0.3s ease-in-out;
    line-height: 1.5;
    font-size: 15px;
}

.user {
    align-self: flex-end;
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    box-shadow: 0 0 15px rgba(59,130,246,0.6);
}

.bot {
    align-self: flex-start;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
}

.system {
    align-self: center;
    font-size: 12px;
    opacity: 0.5;
}

.input-area {
    display: flex;
    padding: 18px;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.03);
}

input {
    flex: 1;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    outline: none;
}

button {
    margin-left: 10px;
    padding: 14px 20px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #10b981, #06b6d4);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.2s ease;
}

button:hover {
    transform: scale(1.05);
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

.typing::after {
    content: "▋";
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0; }
}
</style>
</head>

<body>

<div class="app">

    <div class="header">
        ✨ Deep's AI Tutor — Powered by RAG + LLM
    </div>

    <div id="chat" class="chat">
        <div class="system">AI is ready.</div>
    </div>

    <div class="input-area">
        <input id="question" placeholder="Ask about your course..." />
        <button onclick="askQuestion()">Send</button>
    </div>

</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerHTML = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
}

async function askQuestion() {
    const input = document.getElementById("question");
    const question = input.value.trim();
    if (!question) return;

    addMessage(question, "user");
    input.value = "";

    const typingMsg = addMessage("Thinking<span class='typing'></span>", "bot");

    const response = await fetch("http://127.0.0.1:8000/ask", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ question })
    });

    const data = await response.json();

    typingMsg.remove();

    let formatted = `<strong>Answer:</strong><br>${data.answer}<br><br>`;

    data.sources.forEach(src => {
        formatted += `
        <div style="margin-top:8px; font-size:13px; opacity:0.7;">
        <b>${src.title}</b> (Video ${src.number})<br>
        ⏱ ${src.start}s – ${src.end}s
        </div>`;
    });

    addMessage(formatted, "bot");
}

document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") askQuestion();
});
</script>

</body>
</html>
